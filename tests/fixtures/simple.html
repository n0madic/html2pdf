<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Simple</title>
<style>
  body { font-family: sans-serif; margin: 24px; color: #222; }
  h1 { color: #1a5fb4; font-size: 28px; }
  p  { font-size: 16px; line-height: 1.5; }
  .box { background: #e8f0fe; border: 2px solid #1a5fb4; padding: 12px; border-radius: 6px; }
  .bold { font-weight: bold; }
  .ital { font-style: italic; }
  .under { text-decoration: underline; }
  .strike { text-decoration: line-through; }
</style>
</head>
<body>
  <h1>Hello, html2pdf</h1>
  <p>This is a <span class="bold">bold</span>, <span class="ital">italic</span>,
     <span class="under">underlined</span> and <span class="strike">struck</span> sample.</p>
  <div class="box">
    <p>A simple box with a colored background and a rounded border.</p>
  </div>
</body>
</html>
